# Fusebase Flow — approval policy (committed default)
#
# This is the canonical approval policy shipped with the template. Hooks read this
# file first, then layer `approval-policy.local.yml` on top if it exists (gitignored).
# Edit this file when you want the default to ship with your fork. Edit the local
# override to apply per-clone preferences without committing.
#
# Schema version drives policy_loader compatibility checks.
# v2 (Fusebase Flow v2.7.0+): require_approval.<action>.artifact_ttl_minutes
#   may be either a flat integer (legacy form) OR a mode-keyed object
#   { direct_to_main: <int>, branch_pr: <int> }. Readers handle both shapes
#   with backward compatibility. v1 projects continue to work unchanged.
schema_version: 2

# Workflow mode for the repo. Solo/local default is direct-to-main.
# Switch to branch_pr for shared/team/high-risk projects.
workflow_mode: direct_to_main   # direct_to_main | branch_pr

# Operations that require an approval artifact on disk before the hook lets them
# through. Each operation is keyed by the action name used in `command-policy.yml`.
# An "approval artifact" is a JSON file at:
#   state/approvals/<operation>-<slug>-<YYYYMMDD>.json
# The artifact must contain { "approved_by": "<operator>", "scope": "<short>",
# "expires_at": "<ISO 8601>", "reason": "<one-liner>" }.
require_approval:
  production_deploy:
    enforce: true
    # Mode-aware TTL (v2.7.0+). Reader looks up workflow_mode and applies the
    # matching value. Backward-compat: a flat integer here also works (legacy
    # v1 schema).
    #
    # Why mode-aware: in solo direct-to-main, DP.6 (the APPROVE-DEPLOY-NOW
    # magic phrase typed at deploy time) is the real per-deploy gate. The
    # artifact's TTL serves only stale-state protection, which barely matters
    # for one operator iterating on one machine. 60 min was over-engineered
    # for solo and produced friction during multi-attempt deploy debugging.
    # In team branch_pr mode, multiple operators may interact with stale
    # approvals from days-old PR reviews; short TTL forces fresh approval
    # against current state. The two contexts deserve different defaults.
    artifact_ttl_minutes:
      direct_to_main: 129600   # 90 days; cookie-like; DP.6 is the real gate
      branch_pr: 60            # 60 min; stale-state protection for team contexts
    rationale: "Production deploys are externally visible and irreversible without rollback ceremony. DP.6 magic phrase is the real per-deploy gate; TTL is stale-state protection only — long for solo direct-to-main, short for team branch_pr."
    # DP.6-phrase authoring (v4.3.0, documented procedure — NO enforcement change): this
    # artifact stays mandatory and on-disk, but the gate does NOT check its author
    # (command_policy.py checks filename + expires_at only). So the Deploy session AUTHORS
    # every required approval artifact on the operator's behalf once the operator types the
    # literal DP.6 phrase — for ALL tickets, INCLUDING database_migration,
    # auth_or_permission_change, protected_path_edit, secret_file_write — never forcing the
    # operator to run commands (`bash hooks/local/approve-local.sh <action> <slug>
    # 'APPROVE-DEPLOY-NOW'`). The typed phrase IS the authorization; authoring WITHOUT it is
    # self-approval and forbidden. For sensitive classes, PRESENT the full scope in chat
    # BEFORE the phrase so it is informed consent (an action not presented is not covered).
    # `dp1_waiver: eligible` (reversible + no sensitive surface) is the minimal-scope
    # fast-path. See workflows/greenlight-deploy.md and role-discipline Deploy phase DP.1.
  lightweight_deploy:
    # FR-21 Lightweight-lane deploy. For a small, reversible, security-neutral
    # change classified Lightweight (see flow-skills/lightweight-lane/SKILL.md), this
    # is the tier-aware deploy gate: it REPLACES production_deploy + the DP.6
    # magic phrase. It is authored by ONE command from the operator's plain
    # go-ahead — `bash hooks/local/approve-local.sh lightweight_deploy <slug> 'ship it'`
    # — not a hand-authored JSON file and not a magic-phrase pause. The point is
    # to remove friction (magic phrase, hand-authored artifact, separate deploy
    # session) while keeping a machine-checkable human-in-the-loop record + tier
    # telemetry. Hooks are opt-in (off by default since v3.6.0); when hooks are
    # off, the explicit chat go-ahead at the rule/agent layer is the gate.
    # NEVER use lightweight_deploy for a change that is not LL-eligible.
    enforce: true
    artifact_ttl_minutes:
      direct_to_main: 129600   # 90 days; the plain go-ahead is the real gate
      branch_pr: 60            # stale-state protection for team contexts
    rationale: "FR-21 Lightweight lane: a one-command stamp of the operator's plain go-ahead replaces the production_deploy artifact + DP.6 magic phrase for small/reversible/security-neutral changes. Friction removed, human-in-the-loop + telemetry kept."
  database_migration:
    enforce: true
    artifact_ttl_minutes: 120
    rationale: "Schema changes can break downstream readers and may not be cleanly reversible."
  destructive_file_delete:
    enforce: true
    artifact_ttl_minutes: 30
    rationale: "Bulk deletes (rm -rf, find -delete) are usually unrecoverable."
  auth_or_permission_change:
    enforce: true
    artifact_ttl_minutes: 60
    rationale: "Auth changes can lock operators out or expose data."
  external_customer_visible_message:
    enforce: true
    artifact_ttl_minutes: 30
    rationale: "Outbound messages (email, SMS, webhooks, public posts) cannot be unsent."
  session_key_or_cookie_use:
    enforce: true
    artifact_ttl_minutes: 30
    rationale: "Live-user verification with operator session credentials needs explicit consent and ephemeral handling."
  secret_file_write:
    enforce: true
    artifact_ttl_minutes: 60
    rationale: ".env / credentials writes risk leaking secrets through git or logs."
  protected_path_edit:
    enforce: true
    artifact_ttl_minutes: 60
    rationale: "Worker-undisturbed and generated paths must show empty diffs unless an exception is approved."

# Roles permitted to author an approval artifact for each operation. Hooks check
# this against the self-attested role of the requesting session.
approval_authors:
  default: ["operator"]
  # Examples (uncomment to require co-sign for high-risk ops):
  # production_deploy: ["operator"]
  # database_migration: ["operator"]

# Where approval artifacts live. Path is relative to git root.
approval_artifact_dir: "state/approvals/"

# Behavior when no artifact is found for a require_approval operation.
on_missing_artifact: deny      # deny | warn

# Behavior when artifact is expired.
on_expired_artifact: deny      # deny | warn

# Whether the local override file may relax (vs. only tighten) this default.
# When false, local override may only deny more, never approve more.
local_override_may_relax: false
