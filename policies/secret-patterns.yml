# Fusebase Flow — secret patterns policy (committed default)
#
# High-confidence regex patterns for secret detection. Used by:
#   - hooks/handlers/user_prompt_submit.py (detect pasted secrets in operator prompts)
#   - hooks/handlers/pre_tool_use.py (block writes that introduce these into files)
#   - hooks/git/pre-commit (scan staged content)
#
# CRITICAL: never print or log a detected value. Hooks redact to "<redacted>"
# in any output.
schema_version: 1
local_override_file: policies/secret-patterns.local.yml

# Default action when a pattern matches.
default_action: block          # block | warn | redact

# Match-anywhere patterns. Each has a category for triage.
patterns:

  - id: aws_access_key_id
    category: aws
    pattern: 'AKIA[0-9A-Z]{16}'
    confidence: high

  - id: aws_secret_access_key
    category: aws
    pattern: '(?i)aws(.{0,20})?(secret|access)(.{0,20})?[''":\s]+([0-9a-zA-Z/+]{40})'
    confidence: high
    note: "matches the literal 40-char secret following an aws-context keyword."

  - id: gcp_service_account_private_key
    category: gcp
    pattern: '"private_key":\s*"-----BEGIN (RSA |EC )?PRIVATE KEY-----'
    confidence: high

  - id: github_personal_access_token
    category: github
    pattern: 'gh[ps]_[A-Za-z0-9_]{36,}'
    confidence: high

  - id: gitlab_personal_access_token
    category: gitlab
    pattern: 'glpat-[A-Za-z0-9_-]{20,}'
    confidence: high

  - id: stripe_live_key
    category: stripe
    pattern: '\b(sk_live|rk_live|pk_live)_[0-9a-zA-Z]{24,}'
    confidence: high

  - id: stripe_test_key
    category: stripe
    pattern: '\b(sk_test|rk_test|pk_test)_[0-9a-zA-Z]{24,}'
    confidence: medium
    note: "test keys are still secrets; warn rather than block."
    action: warn

  - id: openai_api_key
    category: openai
    pattern: 'sk-[A-Za-z0-9_-]{40,}'
    confidence: high

  - id: anthropic_api_key
    category: anthropic
    pattern: 'sk-ant-[A-Za-z0-9-]{20,}'
    confidence: high

  - id: slack_token
    category: slack
    pattern: 'xox[bpoa]-[0-9]+-[0-9]+-[A-Za-z0-9]+'
    confidence: high

  - id: slack_webhook
    category: slack
    pattern: 'https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+'
    confidence: high

  - id: twilio_auth_token
    category: twilio
    pattern: '(?i)twilio.{0,20}(auth|token).{0,20}[''":\s]+[a-f0-9]{32}'
    confidence: medium

  - id: sendgrid_api_key
    category: sendgrid
    pattern: 'SG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}'
    confidence: high

  - id: rsa_private_key_block
    category: pki
    pattern: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    confidence: high

  - id: jwt_token_long
    category: jwt
    pattern: 'eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}'
    confidence: medium
    note: "JWT-shaped strings; could be public or signed. Warn rather than block."
    action: warn

  - id: google_oauth_token
    category: google
    pattern: 'ya29\.[A-Za-z0-9_-]{20,}'
    confidence: high

  - id: generic_password_in_url
    category: generic
    pattern: '://[^/\s:@]+:[^/\s:@]{4,}@'
    confidence: medium
    note: "user:password@host pattern; could be a real cred."

  - id: dotenv_write_attempt
    category: env_file
    pattern: '^\s*(?:[A-Z][A-Z0-9_]*)\s*=\s*[''"]?[A-Za-z0-9+/=_-]{20,}[''"]?\s*$'
    confidence: low
    note: "looks like an .env line; only flag if accompanied by a write to .env path."
    action: warn
    only_when_target_path_matches: '\.env(\..*)?$'

  - id: cookie_session_value
    category: session
    pattern: '(?i)(set-cookie|cookie)\s*[:=]\s*[a-zA-Z0-9._=-]+=[A-Za-z0-9+/=._-]{20,}'
    confidence: medium
    note: "session cookies in pasted text; HR-IM-9 / FR-12 session_key_or_cookie_use applies."
    action: warn

# Per-tool overrides. Some tools handle pasted text differently.
per_tool_overrides:
  user_prompt_submit:
    action: warn          # warn rather than block when operator pastes; they may need to discuss the secret's existence
    redact_in_audit: true # but redact in audit log
  pre_tool_use:
    action: block         # block writes that would persist a secret
  git_pre_commit:
    action: block         # block staged content with a secret

# Whitelisted patterns. Use sparingly; document why.
whitelist: []
# Example:
# - id: example_gh_token_in_test
#   pattern: 'ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'
#   reason: "fixture token used in unit test, intentionally fake"

# Behavior on detection.
on_match:
  redact_in_logs: true            # never log the matched value
  surface_pattern_id: true        # do log which pattern fired
  attach_remediation_hint: true   # hooks attach a "rotate the cred + git reset --soft HEAD~1" hint
