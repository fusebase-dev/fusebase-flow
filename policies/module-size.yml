# Fusebase Flow — module-size ratchet (FR-25, committed default)
#
# Declarative source for FR-25 (module-size discipline). Consumed by
# hooks/shared/module_size.py (wrapper: hooks/local/check-module-size.sh),
# wired into hooks/git/pre-commit; optionally into a Claude Code Stop hook.
#
# Ratchet semantics — stops growth, never forces a big-bang refactor:
#   - a gated file NOT in the baseline must be <= ceiling
#   - a gated file IN the baseline may not grow past its baseline value while
#     over the ceiling (touching / shrinking it is always fine)
#   - no baseline file committed yet -> the gate WARNS only and prints the
#     generation instruction (adoption-safe on repos with existing monoliths)
# Generate/refresh (agent-run on the operator's go-ahead, deliberate):
#   bash hooks/local/check-module-size.sh --write-baseline
schema_version: 1

# Max lines for a single source file. 800 ~= single-pass AI-readable (spec Q-B).
ceiling: 800

# Committed ratchet baseline ("<lines> <path>" rows, over-ceiling files only).
# The template SHIPS its own (dogfood) baseline, so the gate is live from
# commit #1 on greenfield instantiations. Installing into an EXISTING repo:
# the agent regenerates it on the operator's go-ahead before the first commit
# (the operator runs no command; also printed by any block):
#   bash hooks/local/check-module-size.sh --write-baseline
# Targeted refresh (rename remedy; never a global amnesty):
#   bash hooks/local/check-module-size.sh --write-baseline <path>
baseline_file: policies/module-size-baseline.txt

# enforcement: block | warn   (warn is forced while baseline_file is absent)
enforcement: block

# Per-project local override (optional, gitignored). ADDITIVE-ONLY:
# only exempt_globs / source_globs entries are merged in (and the engine prints
# a notice whenever the local file is active). enforcement / ceiling /
# baseline_file canNOT be overridden locally — a gitignored kill switch would
# disarm the gate invisibly to git diff and review.
local_override_file: policies/module-size.local.yml

# What counts as source. Markdown/docs deliberately excluded — FR-23 owns docs.
source_globs:
  - "**/*.ts"
  - "**/*.tsx"
  - "**/*.js"
  - "**/*.jsx"
  - "**/*.mjs"
  - "**/*.cjs"
  - "**/*.vue"
  - "**/*.svelte"
  - "**/*.py"
  - "**/*.go"
  - "**/*.rb"
  - "**/*.rs"
  - "**/*.java"
  - "**/*.kt"
  - "**/*.swift"
  - "**/*.cs"
  - "**/*.php"
  - "**/*.c"
  - "**/*.cc"
  - "**/*.cpp"
  - "**/*.h"
  - "**/*.hpp"
  - "**/*.sh"
  - "**/*.sql"

# Never gated: deps, build output, generated code, lockfiles, vendored trees.
# Add a project's JUSTIFIED monolith classes here (data-as-code catalogs,
# upstream complete-file mirrors) — exemption is explicit and reviewable.
exempt_globs:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/__tests__/**"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/out/**"
  - "**/vendor/**"
  - ".fusebase-flow-source/**"
  - "**/generated/**"
  - "**/__generated__/**"
  - "**/*.min.*"
  - "**/*.lock"
  - "**/package-lock.json"
  - "**/migrations/**"
